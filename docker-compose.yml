services:
  autoforge-serve:
    build: .
    ports:
      - "8000:8000"
    environment:
      AUTOFORGE_HOST: "0.0.0.0"
      AUTOFORGE_PORT: "8000"
      AUTOFORGE_MODEL_PATH: "${AUTOFORGE_MODEL_PATH:-}"
    volumes:
      - ./models:/app/models:ro
    command: ["python", "-m", "serving.run", "--host", "0.0.0.0", "--port", "8000"]
